<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StackSpark — TaskFlow</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <!-- Fallback fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- BG EFFECTS -->
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>

  <!-- MAIN APP -->
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="s-logo-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="14,2 6,13 12,13 10,22 18,11 12,11"/></svg>
        </div>
        <span>Task<em>Flow</em></span>
      </div>

      <div class="sidebar-stats">
        <div class="stat-pill">
          <span class="stat-dot all"></span>
          <span class="stat-label">All Tasks</span>
          <span class="stat-count" id="statAll">0</span>
        </div>
        <div class="stat-pill">
          <span class="stat-dot active"></span>
          <span class="stat-label">Active</span>
          <span class="stat-count" id="statActive">0</span>
        </div>
        <div class="stat-pill">
          <span class="stat-dot done"></span>
          <span class="stat-label">Completed</span>
          <span class="stat-count" id="statDone">0</span>
        </div>
      </div>

      <!-- PROGRESS RING -->
      <div class="progress-ring-wrap">
        <svg class="progress-ring" viewBox="0 0 120 120">
          <circle class="ring-bg"    cx="60" cy="60" r="50" fill="none" stroke-width="8"/>
          <circle class="ring-fill"  cx="60" cy="60" r="50" fill="none" stroke-width="8"
                  stroke-dasharray="314" stroke-dashoffset="314" id="ringFill"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct" id="ringPct">0%</span>
          <span class="ring-sub">Done</span>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="filter-group">
        <p class="filter-title">Filter</p>
        <button class="filter-btn active" data-filter="all">
          <span>🗂</span> All
        </button>
        <button class="filter-btn" data-filter="active">
          <span>⚡</span> Active
        </button>
        <button class="filter-btn" data-filter="completed">
          <span>✅</span> Completed
        </button>
      </div>

      <!-- PRIORITY FILTERS -->
      <div class="filter-group">
        <p class="filter-title">Priority</p>
        <button class="filter-btn" data-filter="high">
          <span class="prio-dot high"></span> High
        </button>
        <button class="filter-btn" data-filter="medium">
          <span class="prio-dot medium"></span> Medium
        </button>
        <button class="filter-btn" data-filter="low">
          <span class="prio-dot low"></span> Low
        </button>
      </div>

      <button class="clear-btn" id="clearCompleted">
        🗑 Clear Completed
      </button>

      <div class="sidebar-footer">
        <span>Saved to localStorage ✦</span>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- HEADER -->
      <header class="main-header">
        <div class="header-left">
          <h1 class="main-title">My Tasks</h1>
          <p class="main-date" id="mainDate"></p>
        </div>
        <div class="header-right">
          <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
          <button class="mob-sidebar-btn" id="mobSidebarBtn" title="Toggle sidebar">☰</button>
        </div>
      </header>

      <!-- ADD TASK FORM -->
      <div class="add-card">
        <div class="add-input-wrap">
          <span class="add-icon">✦</span>
          <input
            type="text"
            class="add-input"
            id="taskInput"
            placeholder="Add a new task… press Enter or click Add"
            maxlength="120"
            autocomplete="off"
          />
        </div>
        <div class="add-meta">
          <!-- Priority selector -->
          <div class="prio-select-wrap">
            <button class="prio-select active" data-prio="medium" id="prioBtn">
              <span class="prio-dot medium" id="prioDot"></span>
              <span id="prioLabel">Medium</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="prio-dropdown" id="prioDropdown">
              <button class="prio-opt" data-prio="high">  <span class="prio-dot high"></span>   High</button>
              <button class="prio-opt" data-prio="medium"><span class="prio-dot medium"></span> Medium</button>
              <button class="prio-opt" data-prio="low">  <span class="prio-dot low"></span>    Low</button>
            </div>
          </div>

          <!-- Due date -->
          <input type="date" class="date-input" id="dueDateInput" title="Due date (optional)"/>

          <!-- Add button -->
          <button class="add-btn" id="addBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Task
          </button>
        </div>
      </div>

      <!-- SEARCH BAR -->
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search tasks…"/>
        <span class="search-clear" id="searchClear">✕</span>
      </div>

      <!-- BULK ACTIONS -->
      <div class="bulk-row" id="bulkRow">
        <label class="bulk-check-wrap">
          <input type="checkbox" id="selectAll"/>
          <div class="bulk-custom-check"></div>
          <span>Select All</span>
        </label>
        <button class="bulk-action-btn" id="bulkComplete">✓ Complete Selected</button>
        <button class="bulk-action-btn danger" id="bulkDelete">🗑 Delete Selected</button>
      </div>

      <!-- TASK LIST -->
      <div class="task-list" id="taskList">
        <!-- Tasks injected by JS -->
      </div>

      <!-- EMPTY STATE -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <h3>No tasks yet</h3>
        <p>Add your first task above and start being productive.</p>
      </div>

    </main>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <span class="toast-dot"></span>
    <span id="toastMsg"></span>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="editOverlay">
    <div class="modal" id="editModal">
      <div class="modal-head">
        <h3>Edit Task</h3>
        <button class="modal-close" id="editClose">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <label class="modal-label">Task Title</label>
        <input type="text" class="modal-input" id="editInput" maxlength="120"/>
        <label class="modal-label">Priority</label>
        <div class="modal-prio-row">
          <button class="modal-prio-btn" data-prio="high">  <span class="prio-dot high"></span>   High</button>
          <button class="modal-prio-btn" data-prio="medium"><span class="prio-dot medium"></span> Medium</button>
          <button class="modal-prio-btn" data-prio="low">  <span class="prio-dot low"></span>    Low</button>
        </div>
        <label class="modal-label">Due Date</label>
        <input type="date" class="modal-input" id="editDate"/>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" id="editCancel">Cancel</button>
        <button class="modal-save"   id="editSave">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
